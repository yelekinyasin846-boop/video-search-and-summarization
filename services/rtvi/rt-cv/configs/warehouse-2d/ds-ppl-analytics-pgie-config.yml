class-attrs-all:
  pre-cluster-threshold: 0.5
  topk: 20

# Assign different thresholds for different classes for optimal performance
class-attrs-0:
  pre-cluster-threshold: 0.85
  topk: 20
class-attrs-1:
  pre-cluster-threshold: 0.85
class-attrs-2:
  pre-cluster-threshold: 0.85
class-attrs-3:
  pre-cluster-threshold: 0.85
class-attrs-4:
  pre-cluster-threshold: 0.85
class-attrs-5:
  pre-cluster-threshold: 0.5
class-attrs-6:
  pre-cluster-threshold: 0.5

property:
  # 1=DBSCAN, 2=NMS, 3= DBSCAN+NMS Hybrid, 4 = None(No clustering)
  cluster-mode: 2
  gie-unique-id: 1
  gpu-id: 0
  scaling-filter: 1
  infer-dims: 3;640;640
  offsets: 0;0;0
  interval: 0
  labelfile-path: ds-detector-labels.txt
  maintain-aspect-ratio: 1
  model-color-format: 0
  net-scale-factor: 0.00392156862745098
  network-mode: 2
  network-type: 0
  # Absolute path to the RT-DETR ONNX. DeepStream auto-builds the engine next to
  # it on first run; set model-engine-file only to point at a pre-built engine.
  onnx-file: <PATH_TO_ONNX_MODEL>
  # model-engine-file: <PATH_TO_ENGINE_FILE>
  num-detected-classes: 7
  output-tensor-meta: 1
  output-blob-names: pred_boxes;pred_logits
  parse-bbox-func-name: NvDsInferParseCustomRTDETRTAO
  strongly-typed: 1
  warmup-engine: 1
  custom-lib-path: /opt/nvidia/deepstream/deepstream/lib/libnvds_infercustomparser.so
