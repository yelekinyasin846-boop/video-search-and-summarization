# Inference Properties
# Absolute paths to the Sparse4D ONNX and labels file on disk.
onnx_file: <PATH_TO_ONNX_MODEL>
# engine_file is where sparse4d_setup.sh writes the TRT engine and the videotemplate
# plugin loads it from. Must be set; rtvicv-deploy rewrites the _b<N> segment per batch.
engine_file: <PATH_TO_ENGINE_FILE>
labels_file: <PATH_TO_LABELS_FILE>
gpu_id: 0 # GPU ID to use for tensor operations
batch_size: 1 # Sparse4D model batch size
num_sensors: 4 # Number of sensors [Deepstream batch size]
enable_fp16: True # Enable FP16 precision (faster but less accurate)
force_engine_rebuild: False # Force rebuild of the engine even if it exists
feedback: True # Feedback flag
partial_batch: True # Use partial batch for inference
interval: 0 # Number of consecutive batches to be skipped for inference

# Calibration Properties
calib_file_path: /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/reference-configs/warehouse-3d/calibration.json # Calibration file path
bev_group_name: bev-sensor-1 # BEV group name
calib_mode: synthetic # Calibration mode
use_camera_groups: True # Groups cameras for multi-view fusion in synthetic mode
recentering: True # Recalculates camera coordinates from a reference point

# Preprocess properties
preprocessed_height: 540
preprocessed_width: 960
aug_configs:
  resize: 0.5
  resize_dims: [960, 540]
  crop: [0, 0, 960, 540]
  flip: False
  rotate: 0
  rotate_3d: 0

# Instance Bank properties
num_anchor: 900
embed_dims: 256 # Embedding dimensions
# Absolute path to the Sparse4D anchor .npy on disk.
anchor: <PATH_TO_ANCHOR_FILE>
anchor_handler: SparseBox3DKeyPointsGenerator
num_temp_instances: 600
default_time_interval: 0.05 # Default time interval for temporal anchor projection
confidence_decay: 0.8
anchor_grad: False
feat_grad: False
max_time_interval: 2
reid_dims: -1

# Decoder properties
num_output: 300 # Max number of bboxes to be output
score_threshold: 0.1 # Score threshold for decoding output
num_torch_threads: 0 # Number of threads for PyTorch

# Visualisation properties
generate_3d_bbox: False # Generate 3D bounding boxes for display
generate_2d_bbox: False # Generate 2D bounding boxes from 3D bounding boxes
bbox_color_mode: instance_id # Color mode class_id or instance_id
display_class_labels: True # Display class labels
display_instance_ids: True # Display instance IDs
display_class_score: True # Display class score
display_3d_bbox: True # Display 3D bounding boxes on frames
display_2d_bbox: False # Display 2D bounding boxes on frames

# Debugging properties
log_level: error # Logging level: info (all messages), warn (warnings & errors), error (errors only)
display_partial_batch_info: False # Display partial batch information
display_tensor_info: False # Whether to display tensor information
display_bbox_list_info: False # Whether to display bboxlist information
max_objects_to_display: 5 # Maximum number of objects to display in bboxlist
dump_frames: False # Enable/disable frame dumping for debugging
dump_max_frames: 50 # Number of frames to dump from each batch
# fixed_input_tensor_path: /home/vishkumar/sparse4d_videotemplate/input_image_10.bin # Path to fixed input tensor file
gpu_postprocess: False # Whether to perform postprocessing (instance bank & decoder) on GPU
trt_logger_severity: 2 # TensorRT logger severity level: 0=INTERNAL_ERROR 1=ERROR 2=WARNING 3=INFO 4=VERBOSE 5=Show all messages
enable_profiler: False # Enable TensorRT layer-wise profiler for performance analysis
