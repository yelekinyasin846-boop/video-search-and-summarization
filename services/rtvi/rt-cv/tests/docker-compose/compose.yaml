# RT-CV + Kafka for tests/configs/source_nvmultiurisrcbin_kafka.compose.txt
#
# Kafka uses apache/kafka (bitnami/kafka tags were removed from public Docker Hub).
# pull_policy: if_not_present avoids pulls when the image is already local.
#
#   docker pull apache/kafka:3.9.0
#   ngc registry login && docker pull --platform linux/amd64 nvcr.io/nvstaging/vss-core/vss-rt-cv:3.2.0-26.05.1
# Or build RT-CV: cd ../.. && docker build -f docker/x86.Dockerfile -t rtvi-cv:3.2.0-custom-x86 .
#
# Usage:
#   cp .env.example .env
#   ../test-scripts/deploy.sh
#   ../test-scripts/run-all-tests.sh

services:
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.0}
    pull_policy: if_not_present
    hostname: kafka
    container_name: rtcv-test-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Do not bind listeners to 0.0.0.0 — apache/kafka copies that into advertised.listeners and fails.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 25s
    networks:
      - rtcv-test

  rt-cv:
    image: ${RTVI_CV_IMAGE:-nvcr.io/nvstaging/vss-core/vss-rt-cv:3.2.0-26.05.1}
    pull_policy: if_not_present
    platform: ${RTVI_CV_PLATFORM:-linux/amd64}
    container_name: rtcv-test-perception
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "6g"
    user: root
    working_dir: /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app
    volumes:
      - ../configs:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/tests/configs:ro
    ports:
      - "9000:9000"
    command:
      - ./metropolis_perception_app
      - -c
      - tests/configs/source_nvmultiurisrcbin_kafka.compose.txt
    networks:
      - rtcv-test
    restart: unless-stopped

networks:
  rtcv-test:
    driver: bridge
