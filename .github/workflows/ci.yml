name: CI

on:
  push:
    branches:
      - main
      - develop
      - "pull-request/[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # The source artifact intentionally excludes .git. The Python package
  # derives its version from VCS metadata, so provide a deterministic
  # CI-only version for artifact-based jobs.
  SETUPTOOLS_SCM_PRETEND_VERSION: 0.0.0+${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Package source once for jobs that do not need git history
  # ---------------------------------------------------------------------------
  prepare-source:
    name: Prepare source artifact
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Package tracked source
        run: |
          git archive --format=tar.gz --prefix=repo/ -o source.tar.gz HEAD
          git ls-files > tracked-files.txt
          ls -lh source.tar.gz

      - name: Upload source artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: source-${{ github.sha }}
          path: |
            source.tar.gz
            tracked-files.txt
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  # ---------------------------------------------------------------------------
  # Job 1: Python lint (ruff check + ruff format + yamllint)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Python)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dev dependencies
        run: uv sync --group dev --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      # Run from repo root so the tracked-file manifest sees YAML files
      # outside services/agent (the job's default working-directory).
      # yamllint is GPL-3.0-or-later, so we run it ephemerally via `uvx`
      # rather than declaring it as a project dep — that way it never
      # appears in services/agent/uv.lock and never lands in any
      # installed project venv. The license-check job is unaffected.
      - name: yamllint
        working-directory: ${{ github.workspace }}
        run: |
          YAML_FILES=$(grep -E '^(\.github/.*\.ya?ml|\.pre-commit-config\.yaml|services/.*\.ya?ml)$' .ci/tracked-files.txt || true)
          if [ -z "$YAML_FILES" ]; then
            echo "No YAML files to lint."
            exit 0
          fi
          uvx yamllint \
            -d "{extends: default, rules: {line-length: {max: 200}, document-start: disable, indentation: {spaces: 2, indent-sequences: consistent}}}" \
            $YAML_FILES

  # ---------------------------------------------------------------------------
  # Job 2: Python type checking (mypy)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dev dependencies
        run: uv sync --group dev --frozen

      - name: mypy
        run: uv run mypy src/vss_agents/

  # ---------------------------------------------------------------------------
  # Job 3: Python tests (pytest + coverage)
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install dev dependencies
        run: uv sync --group dev --frozen

      - name: pytest
        timeout-minutes: 10
        run: |
          uv run pytest \
            --cov=src/vss_agents \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -m "not slow and not integration"

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-report
          path: services/agent/coverage.xml

  # ---------------------------------------------------------------------------
  # Job 4: Security scanning (detect-secrets)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (detect-secrets)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install detect-secrets
        run: python -m pip install detect-secrets==1.5.0

      - name: detect-secrets
        run: |
          detect-secrets-hook --no-verify \
            --exclude-files '(gitleaks-baseline\.json|^deploy/docker/MANIFEST$)' \
            --exclude-files '(\.secrets\.baseline|gitleaks-baseline\.json|^deployments/MANIFEST$)' \
            $(cat "$GITHUB_WORKSPACE/.ci/tracked-files.txt")

  # ---------------------------------------------------------------------------
  # Job 5: Frontend lint + typecheck
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Lint & Typecheck (UI)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/ui
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: services/ui/.nvmrc
          cache: "npm"
          cache-dependency-path: services/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      # UI: only three workspaces define `lint` (all run `eslint` without ESLint 9 flat config in-tree).
      # Exclude them so CI does not run eslint here; no changes under services/ui required.
      # TODO: remove this once the dev source is fixed for linting.
      - name: Lint
        run: npm run lint -- --filter='!@nemo-agent-toolkit/ui' --filter='!nemo-agent-toolkit-ui' --filter='!nv-metropolis-bp-vss-ui'

      # Skip nv-metropolis-bp-vss-ui workspaces: `tsc` cannot resolve sibling `@nv-metropolis-bp-vss-ui/*`
      # without the full local build graph. Skip nemo app + `@nemo-agent-toolkit/ui` lib: workspace path/types
      # for `@aiqtoolkit-ui/common` and other packages do not satisfy `tsc` in CI; lib also has TS errors.
      # Remaining typecheck: `@aiqtoolkit-ui/common` only.
      # TODO: remove these filters once the dev source is fixed for typechecking.
      - name: Typecheck
        run: |
          npm run typecheck -- \
            --filter='!nv-metropolis-bp-vss-ui' \
            --filter='!nemo-agent-toolkit-ui' \
            --filter='!@nemo-agent-toolkit/ui' \
            --filter='!@nv-metropolis-bp-vss-ui/alerts' \
            --filter='!@nv-metropolis-bp-vss-ui/all' \
            --filter='!@nv-metropolis-bp-vss-ui/dashboard' \
            --filter='!@nv-metropolis-bp-vss-ui/map' \
            --filter='!@nv-metropolis-bp-vss-ui/search' \
            --filter='!@nv-metropolis-bp-vss-ui/video-management'

  # ---------------------------------------------------------------------------
  # Job 6: Frontend build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Build (UI)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/ui
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: services/ui/.nvmrc
          cache: "npm"
          cache-dependency-path: services/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Job 7: Copyright header check
  # ---------------------------------------------------------------------------
  copyright-headers:
    name: Copyright Headers
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Check SPDX headers
        run: python3 .github/scripts/check_copyright_headers.py

  # ---------------------------------------------------------------------------
  # Job 8: DCO sign-off check
  # ---------------------------------------------------------------------------
  dco:
    name: DCO Sign-off
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          # Only check commits that are authored on this branch — i.e. NOT already
          # reachable from any long-lived upstream branch (main, develop, release/*,
          # hotfix/*) or from the PR base (when running on a `pull_request` event).
          # This avoids re-checking historical commits that were inherited via a sync
          # or rebase from another branch and that pre-date the DCO requirement.
          BASE="${GITHUB_BASE_REF:-develop}"

          # `actions/checkout` only fetches the checked-out ref. Make sure the refs we
          # use as exclusion bases exist locally. Failures are tolerated (e.g. a fresh
          # repo with no release/* branches yet).
          for ref in "$BASE" main develop; do
            git rev-parse --verify "origin/$ref" >/dev/null 2>&1 || \
              git fetch --no-tags --quiet origin \
                "+refs/heads/$ref:refs/remotes/origin/$ref" 2>/dev/null || true
          done
          for pattern in 'release/*' 'hotfix/*' 'dev/*'; do
            git fetch --no-tags --quiet origin \
              "+refs/heads/$pattern:refs/remotes/origin/$pattern" 2>/dev/null || true
          done

          # Build the exclusion set from every long-lived upstream branch we know
          # about. A commit reachable from any of these is inherited history.
          # dev/* covers integration / release-prep branches (e.g. dev/3.2.0)
          # which carry squash-merged history from develop and shouldn't have
          # each historical commit re-checked.
          EXCLUDES=()
          while IFS= read -r ref; do
            [ -n "$ref" ] && EXCLUDES+=("^$ref")
          done < <(git for-each-ref --format='%(refname:short)' \
              refs/remotes/origin/main \
              refs/remotes/origin/develop \
              'refs/remotes/origin/release/*' \
              'refs/remotes/origin/hotfix/*' \
              'refs/remotes/origin/dev/*' 2>/dev/null)

          # --no-merges: skip auto-generated merge commits (e.g. from "Update branch" /
          # `git merge develop` into a feature branch). They have no Signed-off-by and
          # are bookkeeping, not authored content. Matches Probot DCO behavior.
          COMMITS=$(git rev-list --no-merges HEAD "${EXCLUDES[@]}" 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "No new commits to check."
            exit 0
          fi
          echo "Checking $(echo "$COMMITS" | wc -l) commit(s) authored on this branch..."
          FAILED=0
          for sha in $COMMITS; do
            MSG=$(git log -1 --format="%B" "$sha")
            if ! echo "$MSG" | grep -q "^Signed-off-by:"; then
              echo "FAIL: Commit $sha missing DCO sign-off"
              echo "  Subject: $(git log -1 --format='%s' "$sha")"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must include a Signed-off-by line."
            echo "Use: git commit -s -m 'your message'"
            echo "Or amend: git commit --amend -s --no-edit"
            exit 1
          fi
          echo "OK: All commits have DCO sign-off."

  # ---------------------------------------------------------------------------
  # Job 9: Dependency license check (Python)
  # ---------------------------------------------------------------------------
  license-check-python:
    name: License Check (Python)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          version: "0.6.2"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      # Delegates to .github/scripts/check_python_licenses.sh which is
      # also called by .pre-commit-config.yaml so local pre-commit and
      # CI run the exact same scan. The script uses --no-default-groups
      # so only runtime deps that actually ship are scanned (dev tools
      # like yamllint are GPL but never distributed).
      - name: Check Python dependency licenses
        working-directory: ${{ github.workspace }}
        run: bash .github/scripts/check_python_licenses.sh

  # ---------------------------------------------------------------------------
  # Job 10: Dependency license check (UI)
  # ---------------------------------------------------------------------------
  license-check-ui:
    name: License Check (UI)
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/ui
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        working-directory: ${{ github.workspace }}
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: services/ui/.nvmrc
          cache: "npm"
          cache-dependency-path: services/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check UI dependency licenses
        run: |
          # Dump all licenses as JSON, then validate in Node.
          # OSRB-approved exceptions are filtered by package name prefix.
          npx license-checker --json --excludePrivatePackages > /tmp/licenses.json

          node -e '
            const licenses = require("/tmp/licenses.json");
            const allowed = new Set([
              "MIT","MIT-0","Apache-2.0","BSD-2-Clause","BSD-3-Clause","ISC","0BSD",
              "Unlicense","CC0-1.0","CC-BY-4.0","CC-BY-3.0","Python-2.0",
              "BlueOak-1.0.0","MPL-2.0"
            ]);
            // OSRB-approved exceptions (dynamically linked, reviewed)
            const excludePrefixes = ["@img/sharp-libvips","@aiqtoolkit-ui/common"];
            const failures = [];
            for (const [pkg, info] of Object.entries(licenses)) {
              const name = pkg.replace(/@[^@]+$/, "");
              if (excludePrefixes.some(p => name.startsWith(p))) continue;
              const lic = String(info.licenses || "UNKNOWN");
              // license-checker appends * when license is inferred from file (e.g. "MIT*")
              const parts = lic.replace(/[()]/g, "").split(/ OR | AND /);
              const ok = parts.some(p => allowed.has(p.trim().replace(/\*$/, "")));
              if (!ok) failures.push(pkg + ": " + lic);
            }
            if (failures.length) {
              console.error("ERROR: " + failures.length + " package(s) with disallowed licenses:\n");
              failures.forEach(f => console.error("  " + f));
              process.exit(1);
            }
            console.log("OK: " + Object.keys(licenses).length + " packages checked.");
          '

  # ---------------------------------------------------------------------------
  # Job 11: Folder structure enforcement (develop-only)
  # ---------------------------------------------------------------------------
  folder-structure:
    name: Check folder structure
    needs: prepare-source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Validate folder structures
        run: python3 .github/scripts/check_folder_structure.py

  # ---------------------------------------------------------------------------
  # Job 12: Trigger downstream pipeline and poll it to completion
  # ---------------------------------------------------------------------------
  trigger-downstream-pipeline:
    name: Trigger Downstream Pipeline
    # Intentionally NOT depending on `test` (pytest) or `frontend-build`
    # so they run in parallel with this job - the downstream pipeline is
    # the long pole (~hours), and the upstream pytest / UI build are
    # independent of what the downstream pipeline exercises. They still
    # gate the overall workflow conclusion via GitHub's required checks.
    needs:
      - prepare-source
      - lint
      - typecheck
      - security
      - frontend-lint
      - copyright-headers
      - dco
      - license-check-python
      - license-check-ui
      - folder-structure
    runs-on: [self-hosted, downstream-pipeline]
    # Holds the runner until the downstream pipeline completes. Must be
    # at least as long as MAX_POLL_DURATION_SECONDS in the poll step
    # (+ a small safety buffer).
    timeout-minutes: 245
    permissions:
      contents: read
      # Needed so the trigger script can call the GitHub REST API to
      # resolve the PR's base branch (only present on `pull_request`
      # events, not on the `push` event used for `pull-request/<N>`
      # synthetic refs created by copy-pr-bot).
      pull-requests: read
    env:
      DOWNSTREAM_CI_URL: ${{ secrets.DOWNSTREAM_CI_URL }}
      DOWNSTREAM_CI_TOKEN: ${{ secrets.DOWNSTREAM_CI_TOKEN }}
      DOWNSTREAM_PROJECT_PATH: ${{ secrets.DOWNSTREAM_PROJECT_PATH }}
      DOWNSTREAM_REF: main
      DOWNSTREAM_SUBMODULE_HASH_VARIABLE: VSS_SUBMODULE_HASH
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: source-${{ github.sha }}
          path: .source-artifact

      - name: Unpack source artifact
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .source-artifact -exec rm -rf {} +
          tar -xzf .source-artifact/source.tar.gz --strip-components=1
          mkdir -p .ci
          mv .source-artifact/tracked-files.txt .ci/tracked-files.txt
          rm -rf .source-artifact

      - name: Trigger pipeline
        id: trigger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/trigger-downstream-pipeline.sh

      - name: Poll pipeline
        env:
          DOWNSTREAM_PIPELINE_ID: ${{ steps.trigger.outputs.pipeline_id }}
          DOWNSTREAM_PROJECT_ID: ${{ steps.trigger.outputs.project_id }}
          POLL_INTERVAL_SECONDS: "120"
          MAX_POLL_DURATION_SECONDS: "14400" # 4 hours
        run: python3 .github/scripts/poll-downstream-pipeline.py
