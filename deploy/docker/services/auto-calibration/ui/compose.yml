services:
  vss-auto-calibration-ui:
    image: nvcr.io/nvstaging/vss-core/vss-auto-calibration-ui:3.2.0-2
    container_name: vss-auto-calibration-ui
    profiles: ["auto_calib","bp_wh_auto_calib_2d","bp_wh_auto_calib_3d","bp_wh_auto_calib_mv3dt"]

    # network_mode: "host"
    ports:
      - ${VSS_AUTO_CALIBRATION_UI_PORT:-5000}:5000
    
    # IPC settings for GPU memory sharing
    ipc: host

    environment:
      - API_URL=${AUTO_CALIBRATION_MS_API_URL:-http://${HOST_IP}:${VSS_AUTO_CALIBRATION_PORT:-8010}/v1}

    restart: unless-stopped

