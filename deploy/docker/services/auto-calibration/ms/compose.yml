services:
  vss-auto-calibration:
    image: nvcr.io/nvstaging/vss-core/vss-auto-calibration:3.2.0-1
    container_name: vss-auto-calibration
    profiles: ["auto_calib","bp_wh_auto_calib_2d","bp_wh_auto_calib_3d","bp_wh_auto_calib_mv3dt"]
    network_mode: "host"
    
    # GPU support
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              device_ids: ["0"]

    # IPC settings for GPU memory sharing
    ipc: host
   
    environment:
      - VGGT_MODEL_PATH=${VGGT_MODEL_PATH:-/tmp/vggt_model/vggt_1B_commercial.pt}
      - VIOS_BASE_URL=${VIOS_BASE_URL:-}
    
    # Volume mounts
    volumes:
      - $VSS_APPS_DIR/services/auto-calibration/projects:/home/auto-calibration-ms/server/projects
      - $VSS_DATA_DIR/auto-calib/vggt:/tmp/vggt_model:ro
    
    # Working directory inside container
    working_dir: /home/auto-calibration-ms/server
   
    # Entrypoint runs setup script first, then executes command
    entrypoint: ["bash", "/home/auto-calibration-ms/server/docker/entrypoint.sh"]

    # Command
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "${VSS_AUTO_CALIBRATION_PORT:-8010}"]

    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VSS_AUTO_CALIBRATION_PORT:-8010}/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1000s

