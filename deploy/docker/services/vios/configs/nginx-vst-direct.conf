# VST ingress nginx config for profiles without SDR/Envoy/SDRC (base, lvs).
# Routes streamprocessing API paths directly to vss-vios-streamprocessing :30001.
# Set VST_NGINX_MODE=vst-direct in the profile .env.

worker_processes auto;

error_log  stderr info;
pid        /tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/nginx/client-body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format detailed '$remote_addr [$time_local] "$request" '
                       '$status $body_bytes_sent '
                       'rt:$request_time ut:$upstream_response_time '
                       'up:$upstream_addr';

    access_log /dev/stdout detailed;

    log_format proxy_debug '$remote_addr [$time_local] "$request" '
                          '$status rt:$request_time ut:$upstream_response_time '
                          'up:$upstream_addr us:$upstream_status';

    client_max_body_size 25G;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 30888;

        set $cache_control_cacheable "public, max-age=3600";

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location ^~ /vst/api/ {
            return 404;
        }

        location = /vst {
            return 301 /vst/;
        }

        location /vst/assets/ {
            alias /vst-ui/assets/;
        }

        location /vst/favicon/ {
            alias /vst-ui/favicon/;
        }

        location /vst/ {
            alias /vst-ui/;
            index index.html;
            try_files $uri $uri/ /vst/index.html;
        }

        location /vst/api/v1/sensor/ {
            access_log /dev/stdout proxy_debug;
            rewrite ^/vst/api/v1/sensor/(.*) /api/v1/sensor/$1 break;
            proxy_pass http://localhost:30000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
        }

        location ~ ^/vst/api/v1/replay/stream/[^/]+/picture$ {
            rewrite ^/vst/api/v1/replay/(.*) /api/v1/replay/$1 break;
            proxy_pass http://localhost:30001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;

            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_hide_header Pragma;
            add_header Cache-Control "public, max-age=3600";
        }

        location /vst/api/v1/ {
            rewrite ^/vst/api/v1/(.*) /api/v1/$1 break;
            proxy_pass http://localhost:30001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store" always;
        }

        location /vst/storage/ {
            rewrite ^/vst/storage/(.*) /storage/$1 break;
            proxy_pass http://localhost:30001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_hide_header Pragma;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}
