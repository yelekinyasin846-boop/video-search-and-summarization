  sdr-streamprocessing:
    image: ${SDR_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_lvs_2d"]
    user: "0:0"
    network_mode: "host"
    logging:
      driver: "json-file"
      options:
        max-size: "8192m"
        max-file: "3"
    container_name: vss-vios-sdr
    volumes:
      - ./sdr-config:/wdm-configs
      - /var/run/docker.sock:/var/run/docker.sock
      - ${VST_DATA_PATH}/sdr/streamprocessing/log:/log
    environment:
      PORT: 4003
      WDM_CLUSTER_CONFIG_FILE: /wdm-configs/docker_cluster_config.json
      CONTAINER_NAME: vss-vios-sdr
      WDM_MSG_KEY: ${REDIS_MSG_KEY}
      WDM_WL_REDIS_SERVER: ${REDIS_HOSTADDR}
      WDM_WL_REDIS_PORT: ${REDIS_PORT}
      WDM_WL_REDIS_MSG_FIELD: sensor.id
      WDM_WL_ADD_URL: /api/v1/proxy/stream/add
      WDM_WL_DELETE_URL: /api/v1/proxy/stream/
      WDM_WL_HEALTH_CHECK_URL: /api/v1/proxy/configuration
      WDM_WL_CHANGE_ID_ADD: camera_proxy
      WDM_WL_CHANGE_ID_DEL: camera_remove
      WDM_PRELOAD_WORKLOAD: ./tests/event_pre-roll.json
      WDM_CLEAR_DATA_WL: true
      WDM_KFK_ENABLE: false
      WDM_MSG_TOPIC: vst_events
      WDM_KFK_BOOTSTRAP_URL: ${KAFKA_BOOTSTRAP_URL}
      WDM_DS_SWAP_ID_NAME: false
      WDM_WL_THRESHOLD: 100
      WDM_ADD_REMOVE_RETRY_ATTEMPTS: 50
      WDM_CLUSTER_TYPE: docker
      WDM_POD_WATCH_DOCKER_DELAY: 0.5
      WDM_RESTART_DS_ON_ADD_FAIL: false
      WDM_DISABLE_WERKZEUG_LOGGING: true
      WDM_WL_OBJECT_NAME: streamprocessing-ms
      WDM_CONSUMER_GRP_ID: sdr-streamprocessing-cg
      WDM_CLUSTER_CONTAINER_NAMES: '["vss-vios-streamprocessing"]'
      VST_STREAMS_ENDPOINT: http://localhost:30000/api/v1/sensor/streams
      VST_STATUS_ENDPOINT: http://localhost:30000/api/v1/sensor/status
      OTEL_SDK_DISABLED: true
      WDM_INITIALIZE_FROM_VST: false
      ENVOY_REQUEST_TIMEOUT: 300
      WDM_TARGET_PORT_MAPPING: "{\"streamprocessing-ms-1\": ${STREAM_PROCESSOR_HTTP_PORT}}"
      OTEL_SERVICE_NAME: SDR_AGENT
      WDM_REDIS_CACHE_OBJECT: "streamprocessing-data"
      WDM_WL_NAME_IGNORE_REGEX: ""
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
      restart_policy:
        condition: always
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${PORT:-4003}'"]
      interval: 15s
      timeout: 3s
      retries: 60
      start_period: 5s
    depends_on:
      redis:
        condition: service_started
      streamprocessing-ms:
        condition: service_healthy
        required: false
      streamprocessing-ms-2d:
        condition: service_healthy
        required: false
      streamprocessing-ms-3d:
        condition: service_healthy
        required: false
      streamprocessing-ms-mv3dt:
        condition: service_healthy
        required: false

