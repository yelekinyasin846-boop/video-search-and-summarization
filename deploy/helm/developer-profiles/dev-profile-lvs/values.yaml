# Optional HAProxy controller subchart removed from Chart.yaml (no bundled install). Use a
# cluster-wide controller; keep vssIngress.ingressClassName aligned with its IngressClass.
# haproxyingress:
#   enabled: false
#   controller:
#     kind: DaemonSet
#     service:
#       enabled: false
#     daemonset:
#       useHostPort: true
#       hostPorts:
#         http: 80
#         https: 443

# LVS profile Ingress: UI, agent, VST; optional kibana.* and phoenix.* hosts when those subcharts are enabled.
vssIngress:
  enabled: false
  ingressClassName: haproxy
  host: ""
  vssUiPort: 3000
  vssAgentPort: 8000
  vstIngressPort: 30888
  # Optional; default kibana.<global.externalHost or vssIngress.host>.
  kibanaHost: ""
  # Default Phoenix exposure is path-based on main host: http://<host>/phoenix
  # Keep empty for path-only mode. Set phoenixHost (for example, phoenix.<host>)
  # only if you also want a separate dedicated Phoenix host rule.
  phoenixHost: ""
  kibanaPort: 5601
  phoenixPort: 6006

# RTVI umbrella: LVS always-on rtvi-vlm. By default, rtvi-vlm loads the integrated
# Cosmos checkpoint in-pod to match the docker LVS profile. LVS deploys Kafka so
# RTVI can publish mdx-vlm events while the LVS backend and vss-agent call RTVI over HTTP.
rtvi:
  enabled: true
  vss-rtvi-cv:
    enabled: false
  vss-rtvi-cv-sdr:
    enabled: false
  vss-rtvi-embed:
    enabled: false
  vss-rtvi-vlm:
    enabled: true
    useSharedNim: false
    modelPath: "ngc:nim/nvidia/cosmos-reason2-8b:hf-1208"
    sharedNimPort: "8000"
    # Wait for the LVS Kafka broker and RTVI topics created by infra.kafka.topicJob.
    waitForKafka:
      enabled: true
      topics:
        - mdx-vlm-captions
        - mdx-vlm-incidents
    # Docker parity: shape from services/rtvi/charts/rtvi-vlm/values.yaml.
    # Full list is required because the subchart replaces `env` rather than merging.
    env:
      - name: OPENAI_API_KEY
        value: "NOAPIKEYSET"
      - name: OPENAI_API_VERSION
        value: ""
      - name: NVIDIA_API_KEY
        value: "NOAPIKEYSET"
      - name: NVIDIA_VISIBLE_DEVICES
        value: "all"
      - name: VLM_MODEL_TO_USE
        value: "cosmos-reason2"
      - name: KAFKA_ENABLED
        value: "true"
      # Raw VLM event topic produced by rtvi-vlm; consumed by the shared
      # Logstash LVS pipeline.
      - name: KAFKA_TOPIC
        value: "mdx-vlm-captions"
      - name: KAFKA_INCIDENT_TOPIC
        value: "mdx-vlm-incidents"
      - name: ERROR_MESSAGE_TOPIC
        value: "vision-llm-errors"
      - name: LOG_LEVEL
        value: "INFO"
      - name: ENABLE_OTEL_MONITORING
        value: "false"
      - name: ENABLE_REDIS_ERROR_MESSAGES
        value: "false"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: "http://otel-collector:4318"
      - name: OTEL_METRIC_EXPORT_INTERVAL
        value: "60000"
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: ""
      - name: OTEL_TRACES_EXPORTER
        value: "otlp"
      - name: NUM_GPUS
        value: "1"
      - name: NUM_VLM_PROCS
        value: ""
      - name: MODEL_IMPLEMENTATION_PATH
        value: ""
      - name: HF_TOKEN
        value: ""
      - name: INSTALL_PROPRIETARY_CODECS
        value: "false"
      - name: FORCE_SW_AV1_DECODER
        value: ""
      - name: RTVI_ADD_TIMESTAMP_TO_VLM_PROMPT
        value: ""
      - name: RTVI_EXTRA_ARGS
        value: ""
      - name: RTVI_RTSP_LATENCY
        value: ""
      - name: RTVI_RTSP_TIMEOUT
        value: ""
      - name: RTVI_RTSP_RECONNECTION_INTERVAL
        value: "5"
      - name: RTVI_RTSP_RECONNECTION_WINDOW
        value: "60"
      - name: RTVI_RTSP_RECONNECTION_MAX_ATTEMPTS
        value: "10"
      - name: VLLM_GPU_MEMORY_UTILIZATION
        value: ""
      - name: VLM_BATCH_SIZE
        value: ""
      # Edge platforms (DGX-SPARK, IGX-THOR, AGX-THOR): override to 860 / 467 / 20 (see dev-profile.sh).
      - name: VLM_DEFAULT_NUM_FRAMES_PER_SECOND_OR_FIXED_FRAMES_CHUNK
        value: "1"
      - name: VLM_INPUT_WIDTH
        value: ""
      - name: VLM_INPUT_HEIGHT
        value: ""
      - name: VLM_SYSTEM_PROMPT
        value: ""
      - name: VSS_NUM_GPUS_PER_VLM_PROC
        value: ""
      - name: VSS_SKIP_INPUT_MEDIA_VERIFICATION
        value: ""
      - name: VLM_MODEL_SUPPORTS_AUDIO
        value: "false"
      - name: VLM_TRUST_REMOTE_CODE
        value: "false"
      - name: VLM_VIDEO_PRUNING_RATE
        value: "0.0"

nims:
  enabled: true
  gpuType: H100
  global:
    pullSecretName: ngc-secret
    authSecretName: ngc-api
    storageClass: ""
  # Keep profile values minimal; model defaults live in helm/services/nims.
  nemotron:
    enabled: true
  cosmos:
    enabled: false
    # GPU only (no cpu/memory); matches NIMService without cpu/memory limits/requests.
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
