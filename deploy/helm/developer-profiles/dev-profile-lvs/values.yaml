# VSS parent chart — LVS profile. Default install matches full LVS stack (equiv. dev-profile.sh -p lvs).
# Install: helm upgrade --install vss . -f values-lvs.yaml -n vss --create-namespace

profile: lvs
mode: ""
llmNameSlug: nvidia-nemotron-nano-9b-v2
vlmNameSlug: none

ngc:
  createSecrets: true
  apiKey: ""

global:
  # When false (default), Service/Workload names use chart short names (redis, vss-vios-streamprocessing, vss-summarization, …). Set true for <release>-<chart> naming.
  useReleaseNamePrefix: false
  imagePullSecrets:
    - name: ngc-secret
  ngcApiSecret:
    name: ngc-api
    key: NGC_API_KEY
  # For default http/https ports (80/443), keep externalPort "" so URLs omit :port; set a port only when not using the default.
  externalScheme: ""
  externalHost: ""
  externalPort: ""
  # Full public Kibana URL for Dashboard tab (vss-agent-ui) and Kibana SERVER_PUBLICBASEURL when subchart value is empty (no /kibana suffix).
  kibanaPublicUrl: ""
  # Remote LLM/VLM (optional): single place for both vss-agent and vss-summarization. Subchart llmBaseUrl/vlmBaseUrl overrides when set.
  llmBaseUrl: ""
  vlmBaseUrl: ""
  # NGC model ids — shared by vss-agent (LLM_NAME / VLM_NAME) and vss-summarization (LVS_LLM_MODEL_NAME, VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME). Override per subchart if needed.
  llmName: "nvidia/nvidia-nemotron-nano-9b-v2"
  vlmName: "nim_nvidia_cosmos-reason2-8b_hf-1208"

# Set global.external* and optional global.kibanaPublicUrl in values-lvs.yaml. Images/replicas: charts/<name>/values.yaml.

infra:
  enabled: true
  phoenix:
    enabled: true
    # Serve Phoenix behind ingress path prefix (http://<host>/phoenix).
    env:
      - name: PHOENIX_HOST_ROOT_PATH
        value: "/phoenix"
  redis:
    enabled: true
  elasticsearch:
    enabled: true
    persistence:
      data:
        size: 10Gi
      logs:
        size: 5Gi
      storageClass: ''
    init:
      enabled: true
      env:
        ELASTICSEARCH_ILM_MIN_AGE: 4h
        ELASTICSEARCH_RTVI_CV_EMBEDDINGS_DIM: '1536'
        ELASTICSEARCH_VISION_LLM_EMBEDDINGS_DIM: '768'
        BP_PROFILE: bp_developer_lvs
  kibana:
    enabled: true
    init:
      enabled: true
      objectsBundle: lvs
  logstash:
    enabled: true
    lvsPipeline:
      enabled: true
  kafka:
    enabled: true
    topicJob:
      enabled: true
    # Shared Logstash consumes the LVS RTVI caption and structured-summary
    # topics through its optional LVS pipeline. Kept the kafka subchart
    # defaults so Kibana dashboards + rtvi-vlm incident topics continue to
    # exist.
    topics:
      - name: mdx-raw
      - name: mdx-bev
      - name: mdx-space-utilization
      - name: mdx-alerts
      - name: mdx-behavior
      - name: mdx-behavior-plus
      - name: mdx-frames
      - name: mdx-mtmc
      - name: mdx-rtls
      - name: mdx-rtls-region-1
      - name: mdx-amr
      - name: mdx-vlm-alerts
      - name: mdx-notification
        partitions: "1"
      - name: mdx-events
      - name: mdx-incidents
      - name: mdx-vlm-incidents
      - name: mdx-vlm
      - name: mdx-embed
      - name: mdx-embed-filtered
      - name: mdx-vlm-captions
      - name: mdx-structured-events-summary
    persistence:
      size: 10Gi
      storageClass: ''

# VIOS umbrella (../../services/vios). Required: vios.enabled — parent Chart.yaml condition: vios.enabled. If missing/false, no VIOS workloads are installed.
vios:
  enabled: true
  vstStorage:
    createSharedPvcs: true
    accessMode: ReadWriteOnce
    vstData:
      size: 10Gi
      storageClass: ""
    vstVideo:
      size: 20Gi
      storageClass: ""
    streamerVideos:
      size: 20Gi
      storageClass: ""
  vss-vios-postgres:
    enabled: true

  vss-vios-envoy-proxy:
    enabled: true

  vss-vios-sdr:
    enabled: true

  vss-vios-sensor:
    enabled: true
    persistence:
      vstData: { enabled: true, create: false, existingClaim: "" }
      vstVideo: { enabled: true, create: false, existingClaim: "" }

  vss-vios-streamprocessing:
    enabled: true
    persistence:
      vstData: { enabled: true, create: false, existingClaim: "" }
      vstVideo: { enabled: true, create: false, existingClaim: "" }
      streamerVideos: { enabled: true, create: false, existingClaim: "" }

  vss-vios-ingress:
    enabled: true
    externallyAccessibleIp: ""

  # Compose parity: dev-profile-lvs/compose.yml `nvstreamer-lvs` (profile
  # `bp_developer_lvs_2d`). Subchart defaults already match the compose
  # image, HTTP_PORT=31000, ADAPTOR=streamer, and
  # NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES=true.
  vss-vios-nvstreamer:
    enabled: true

vss-summarization:
  enabled: true
  elasticsearchHost: ""
  elasticsearchPort: "9200"
  llmService: ""
  vlmService: "vss-rtvi-vlm"
  # LVS backend routes VLM calls through vss-rtvi-vlm (docker parity: RTVI_VLM_URL=http://HOST:RTVI_VLM_PORT).
  # Values are rendered with `tpl` so {{ .Release.Name }} works when global.useReleaseNamePrefix is enabled.
  extraEnv:
    - name: RTVI_VLM_URL
      value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $svc := "vss-rtvi-vlm" }}{{- printf "http://%s:8000" (ternary (printf "%s-%s" .Release.Name $svc) $svc $pfx) -}}'
    - name: RTVI_VLM_URL_PASSTHROUGH
      value: "true"
    # Compose parity: dev-profile-lvs/.env sets LVS_ENABLE_LLM_MERGING=true.
    # Subchart default is "false"; this override re-enables LLM-based merging
    # of overlapping/duplicate events for the LVS profile.
    - name: LVS_ENABLE_LLM_MERGING
      value: "true"

agent:
  enabled: true
  vss-agent:
    enabled: true
    # Subchart: keep `lvs` for deployment/env wiring (not used for ConfigMap paths).
    profile: lvs
    mountConfigEdge: false
    mountEvalOutput: true
    # LVS always routes VLM through vss-rtvi-vlm (rtvi subchart below). rtviVlmEnabled/cosmosEmbedEnabled
    # mirror dev-profile-alerts; RTVI_VLM_BASE_URL in the env list below picks up rtviVlmServiceName.
    rtviVlmEnabled: true
    rtviVlmServiceName: "vss-rtvi-vlm"
    cosmosEmbedEnabled: false
    lvsBackendService: "vss-summarization"
    vstInternalUrl: ""
    vstInternalIp: ""
    vssAgentExternalUrl: ""
    vssAgentVersion: "3.2.0-26.05.2-67b165b4bfbd"
    evalLlmJudgeName: ""
    evalLlmJudgeBaseUrl: ""
    reportsBaseUrl: ""
    vstExternalUrl: ""
    externalIp: ""
    # vss-agent: full explicit container env for LVS (Option B). LVS_BACKEND_URL uses lvsBackendService + release prefix via tpl.

    env:
      - name: VSS_AGENT_CONFIG_FILE
        value: '{{ .Values.configFilePath | default "/etc/vss-agent/config.yml" }}'
      - name: VSS_AGENT_HOST
        value: '0.0.0.0'
      - name: VSS_AGENT_PORT
        value: '8000'
      - name: LLM_MODE
        value: '{{- $g := .Values.global | default dict }}{{- $llm := ((coalesce (.Values.llmBaseUrl | default "") ((index $g "llmBaseUrl") | default "") "") | default "" | toString | trim) }}{{- if $llm }}remote{{- else }}local{{- end }}'
      - name: VLM_MODE
        value: '{{- $g := .Values.global | default dict }}{{- $vlm := ((coalesce (.Values.vlmBaseUrl | default "") ((index $g "vlmBaseUrl") | default "") "") | default "" | toString | trim) }}{{- if $vlm }}remote{{- else }}local{{- end }}'
      - name: LLM_MODEL_TYPE
        value: nim
      # LVS routes VLM calls through vss-rtvi-vlm (/generate_captions), so video_understanding uses the rtvi_vlm LLM profile
      # defined in configs/vss-agent/config.yml. Override to `nim` only to bypass RTVI and hit the NIM VLM directly.
      - name: VLM_MODEL_TYPE
        value: rtvi
      - name: VSS_AGENT_OBJECT_STORE_TYPE
        value: local_object_store
      - name: EXTERNAL_IP
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{ coalesce .Values.externalIp $eh "127.0.0.1" }}'
      - name: INTERNAL_IP
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $viosIng := ternary (printf "%s-vss-vios-ingress:30888" .Release.Name) "vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstInternalIp $viosIng }}'
      - name: HOST_IP
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $viosIng := ternary (printf "%s-vss-vios-ingress:30888" .Release.Name) "vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstInternalIp $viosIng }}'
      - name: LVS_BACKEND_URL
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $svc := trim (.Values.lvsBackendService | default "vss-summarization") }}{{ ternary (printf "http://%s-%s:38111" .Release.Name $svc) (printf "http://%s:38111" $svc) $pfx }}'
      - name: RTVI_EMBED_PORT
        value: ''
      - name: RTVI_CV_PORT
        value: ''
      - name: VSS_ES_PORT
        value: ''
      - name: VST_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vstHttp := ternary (printf "http://%s-vss-vios-ingress:30888" .Release.Name) "http://vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstBaseUrl .Values.vstExternalUrl $globalBase $vstHttp }}'
      - name: VIDEO_ANALYSIS_MCP_URL
        value: '{{- if (trim (.Values.videoAnalysisMcpUrl | default "")) }}{{ trim .Values.videoAnalysisMcpUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $host := ternary (printf "%s-vss-va-mcp" .Release.Name) "vss-va-mcp" $pfx }}{{- printf "http://%s:9901" $host -}}{{- end }}'
      - name: RTVI_VLM_BASE_URL
        value: '{{- if (trim (.Values.rtviVlmBaseUrl | default "")) }}{{ trim .Values.rtviVlmBaseUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $svc := trim (.Values.rtviVlmServiceName | default "vss-rtvi-vlm") }}{{- printf "http://%s:8000" (ternary (printf "%s-%s" .Release.Name $svc) $svc $pfx) -}}{{- end }}'

      - name: NVIDIA_API_KEY
        value: ''
      - name: OPENAI_API_KEY
        value: ''
      - name: COSMOS_EMBED_ENDPOINT
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $def := ternary (printf "http://%s-vss-rtvi-embed:8000" .Release.Name) "http://vss-rtvi-embed:8000" $pfx }}{{ coalesce .Values.cosmosEmbedEndpoint $def }}'
      - name: ELASTIC_SEARCH_ENDPOINT
        value: '{{- if (trim (.Values.elasticsearchUrl | default "")) }}{{ trim .Values.elasticsearchUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $h := ternary (printf "%s-elasticsearch" .Release.Name) "elasticsearch" $pfx }}{{- printf "http://%s:9200" $h -}}{{- end }}'
      - name: ELASTIC_SEARCH_INDEX
        value: '{{ .Values.elasticsearchIndex | default "" }}'
      - name: PHOENIX_ENDPOINT
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{ ternary (printf "http://%s-phoenix:6006" .Release.Name) "http://phoenix:6006" $pfx }}'
      - name: LLM_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $llm := ((coalesce (.Values.llmBaseUrl | default "") ((index $g "llmBaseUrl") | default "") "") | default "" | toString | trim) }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $def := ternary (printf "http://%s-nvidia-nemotron-nano-9b-v2:8000" .Release.Name) "http://nvidia-nemotron-nano-9b-v2:8000" $pfx }}{{- if $llm }}{{ $llm }}{{- else }}{{ $def }}{{- end }}'
      - name: VLM_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $vlm := ((coalesce (.Values.vlmBaseUrl | default "") ((index $g "vlmBaseUrl") | default "") "") | default "" | toString | trim) }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $def := ternary (printf "http://%s-vss-rtvi-vlm:8000" .Release.Name) "http://vss-rtvi-vlm:8000" $pfx }}{{- if $vlm }}{{ $vlm }}{{- else }}{{ $def }}{{- end }}'
      - name: VST_EXTERNAL_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.vssAgentExternalUrl .Values.vstExternalUrl $globalBase $vssAgentHttp }}'
      - name: VST_INTERNAL_URL
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vstHttp := ternary (printf "http://%s-vss-vios-ingress:30888" .Release.Name) "http://vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstInternalUrl $vstHttp }}'
      - name: LLM_NAME
        value: '{{- $g := .Values.global | default dict }}{{ trim (coalesce .Values.llmName ((index $g "llmName") | default "") "nvidia/nvidia-nemotron-nano-9b-v2") }}'
      - name: VLM_NAME
        value: '{{- $g := .Values.global | default dict }}{{ trim (coalesce .Values.vlmName ((index $g "vlmName") | default "") "nim_nvidia_cosmos-reason2-8b_hf-1208") }}'
      - name: EVAL_LLM_JUDGE_NAME
        value: '{{- $g := .Values.global | default dict }}{{- $ln := trim (coalesce .Values.llmName ((index $g "llmName") | default "") "nvidia/nvidia-nemotron-nano-9b-v2") }}{{ coalesce .Values.evalLlmJudgeName $ln }}'
      - name: EVAL_LLM_JUDGE_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $llm := ((coalesce (.Values.llmBaseUrl | default "") ((index $g "llmBaseUrl") | default "") "") | default "" | toString | trim) }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $def := ternary (printf "http://%s-nvidia-nemotron-nano-9b-v2:8000" .Release.Name) "http://nvidia-nemotron-nano-9b-v2:8000" $pfx }}{{ coalesce .Values.evalLlmJudgeBaseUrl $llm $def }}'
      - name: VSS_AGENT_REPORTS_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.reportsBaseUrl (ternary (printf "%s/static/" $globalBase) "" (ne $globalBase "")) (printf "%s/static/" $vssAgentHttp) }}'
      - name: VSS_AGENT_EXTERNAL_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.vssAgentExternalUrl .Values.vstExternalUrl $globalBase $vssAgentHttp }}'
      - name: AGENT_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.vssAgentExternalUrl .Values.vstExternalUrl $globalBase $vssAgentHttp }}'
      - name: VSS_AGENT_VERSION
        value: '{{ .Values.vssAgentVersion | default "3.2.0-26.05.2-67b165b4bfbd" }}'
      # Audio configuration (compose parity: deploy/docker/services/agent/compose.yml).
      # Set enableAudio=true for Nemotron Nano Omni audio-aware VLM.
      - name: ENABLE_AUDIO
        value: '{{ .Values.enableAudio | default "false" }}'
vss-agent-ui:
  enabled: true
  # NEXT_PUBLIC_* defaults aligned with dev-profile-base; LVS deltas: subtitle + dashboard tab.
  agentApiUrlBase: ""
  vstApiUrl: ""
  chatCompletionUrl: ""
  websocketChatUrl: ""
  dashboardKibanaBaseUrl: ""
  envOverrides:
    - name: NEXT_PUBLIC_ALERTS_TAB_ALERT_REPORT_PROMPT_TEMPLATE
      value: 'Generate a report for incident {incidentId} with sensor id {sensorId}.'
    - name: NEXT_PUBLIC_ALERTS_TAB_DEFAULT_AUTO_REFRESH_IN_MILLISECONDS
      value: "1000"
    - name: NEXT_PUBLIC_ALERTS_TAB_ALERTS_FETCH_DEFAULT_TIME_WINDOW_IN_MINUTES
      value: "10"
    - name: NEXT_PUBLIC_ALERTS_TAB_ALERTS_FETCH_MAX_RESULT_SIZE
      value: "100"
    - name: NEXT_PUBLIC_ALERTS_TAB_MAX_SEARCH_TIME_LIMIT
      value: "0"
    - name: NEXT_PUBLIC_ALERTS_TAB_MEDIA_WITH_OBJECTS_BBOX
      value: "true"
    - name: NEXT_PUBLIC_ALERTS_TAB_VERIFIED_FLAG_DEFAULT
      value: "false"
    - name: NEXT_PUBLIC_APP_TITLE
      value: "VSS BLUEPRINT"
    - name: NEXT_PUBLIC_APP_SUBTITLE
      value: "Vision (LVS)"
    - name: NEXT_PUBLIC_CHAT_API_CUSTOM_AGENT_PARAMS_JSON
      value: '{"params":[{"name":"llm_reasoning","label":"LLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""},{"name":"vlm_reasoning","label":"VLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""}]}'
    - name: NEXT_PUBLIC_CHAT_HISTORY_DEFAULT_ON
      value: "true"
    - name: NEXT_PUBLIC_CHAT_INPUT_MIC_ENABLED
      value: "false"
    - name: NEXT_PUBLIC_CHAT_MESSAGE_COPY_ENABLED
      value: "false"
    - name: NEXT_PUBLIC_CHAT_MESSAGE_EDIT_ENABLED
      value: "false"
    - name: NEXT_PUBLIC_CHAT_MESSAGE_SPEAKER_ENABLED
      value: "false"
    - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_CONFIG_TEMPLATE_JSON
      value: "{}"
    - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_ENABLE
      value: "true"
    - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE
      value: "Let's show the videos just uploaded {filenames}?"
    - name: NEXT_PUBLIC_CHAT_UPLOAD_FILE_METADATA_ENABLED
      value: "false"
    - name: NEXT_PUBLIC_DARK_THEME_DEFAULT
      value: "true"
    - name: NEXT_PUBLIC_DASHBOARD_TAB_KIBANA_BASE_URL
      value: ""
    - name: NEXT_PUBLIC_ENABLE_ALERTS_TAB
      value: "false"
    - name: NEXT_PUBLIC_ENABLE_CHAT_TAB
      value: "false"
    - name: NEXT_PUBLIC_ENABLE_DASHBOARD_TAB
      value: "true"
    - name: NEXT_PUBLIC_ENABLE_INTERMEDIATE_STEPS
      value: "true"
    - name: NEXT_PUBLIC_ENABLE_MAP_TAB
      value: "false"
    - name: NEXT_PUBLIC_ENABLE_SEARCH_TAB
      value: "false"
    - name: NEXT_PUBLIC_ENABLE_VIDEO_MANAGEMENT_TAB
      value: "true"
    - name: NEXT_PUBLIC_INTERACTION_MODAL_CANCEL_ENABLED
      value: "false"
    - name: NEXT_PUBLIC_MAP_URL
      value: ""
    - name: NEXT_PUBLIC_MDX_WEB_API_URL
      value: ""
    - name: NEXT_PUBLIC_RIGHT_MENU_OPEN
      value: "false"
    - name: NEXT_PUBLIC_SIDEBAR_CHAT_CHAT_API_CUSTOM_AGENT_PARAMS_JSON
      value: '{"params":[{"name":"llm_reasoning","label":"LLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""},{"name":"vlm_reasoning","label":"VLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""}]}'
    - name: NEXT_PUBLIC_SIDEBAR_CHAT_CHAT_HISTORY_DEFAULT_ON
      value: "true"
