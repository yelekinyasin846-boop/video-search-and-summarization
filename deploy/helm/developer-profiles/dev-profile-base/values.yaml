# NIM models — shared umbrella helm/services/nims (Nemotron Nano 9B v2 + Cosmos Reason2 8B). Set nims.enabled false to skip all NIM CRDs.
nims:
  enabled: true
  gpuType: H100
  global:
    pullSecretName: ngc-secret
    authSecretName: ngc-api
    storageClass: ""
  nemotron:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2
      tag: "1"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
    storage:
      pvc:
        storageClass: ""
        size: 120Gi
    service:
      type: ClusterIP
      port: 8000
    nodeSelector: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
  cosmos:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/cosmos-reason2-8b
      tag: "1.6.0"
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
    storage:
      pvc:
        storageClass: ""
        size: 120Gi
    service:
      type: ClusterIP
      port: 8000
    nodeSelector: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    env:
      CUDA_VISIBLE_DEVICES: "0"
      NIM_KVCACHE_PERCENT: "0.75"
      NIM_MAX_MODEL_LEN: "16384"
      NIM_LOW_MEMORY_MODE: "true"
