# VSS parent chart — alerts profile (see README). Default install matches verification mode (2d_cv).
# Usage: helm install vss-alerts . -f values-verification.yaml -n vss-alerts --create-namespace
# Smaller / LVS stacks: override enabled flags or use profile-specific values files.

profile: alerts
mode: verification

# NGC: when using nvcr.io images, set ngc.createSecrets and ngc.apiKey (or use -f values-ngc-secrets.yaml).
ngc:
  createSecrets: true
  apiKey: ""
  # apiKeySecretName: "ngc-api"
  # dockerSecretName: "ngc-secret"

# Deployments/Services use the subchart name by default (e.g. redis, vss-agent), not <release>-<chart>.
# To restore release-prefixed names, set global.useReleaseNamePrefix: true (or per-subchart useReleaseNamePrefix: true).
# Set global.imagePullSecrets for private registry. Set global.storageClass for PVCs in values file.
# When subchart URL/host fields are empty, vss-agent-ui / vss-agent / vss-vios-ingress / vss-alert-bridge use global.external* (scheme defaults to http).
# global.kibanaPublicUrl: optional override for public Kibana URL (no path suffix). When empty and global.externalHost is set, vss-agent-ui / kibana derive http(s)://kibana.<externalHost> (matches vssIngress kibana host rule when enabled).
# global.llmBaseUrl / vlmBaseUrl: remote NIM endpoints (optional). Passed through to vss-agent for LLM_BASE_URL / VLM_BASE_URL and RTVI_VLM_BASE_URL
# (verification: RTVI tracks VLM; real-time: RTVI uses remote VLM URL when set, else vss-rtvi-vlm). Override per-agent with agent.vss-agent.llmBaseUrl / vlmBaseUrl.
# global.llmName / vlmName: shared defaults for vss-agent (override with agent.vss-agent.llmName, etc. when needed).
global:
  useReleaseNamePrefix: false
  postgresServiceHost: ""
  imagePullSecrets:
    - name: ngc-secret
  ngcApiSecret:
    name: ngc-api
    key: NGC_API_KEY
  externalScheme: ""
  externalHost: ""
  externalPort: ""
  kibanaPublicUrl: ""
  llmBaseUrl: ""
  vlmBaseUrl: ""
  llmName: "nvidia/nvidia-nemotron-nano-9b-v2"
  vlmName: "nvidia/cosmos-reason2-8b"
  # When true (default), vss-vios-sensor uses the same PVC base name as vss-vios-streamprocessing for vst-data / vst-video. Keep aligned with vios.vstStorage.createSharedPvcs.
  createSharedVstPvcs: true

# External access: set global.externalScheme / externalHost / externalPort in your values file (no separate externalAccess.baseUrl).

# Verification stack enabled by default. Image repository/tag/replicas: charts/<name>/values.yaml (override when needed).
# Redis is the shared StatefulSet from helm/services/infra (vanilla redis:8.2.2-alpine). Extend with a Redis Stack image + values if modules are required.
infra:
  enabled: true
  phoenix:
    enabled: true
    # Serve Phoenix behind ingress path prefix (http://<host>/phoenix).
    # Required so Phoenix emits asset URLs with /phoenix prefix.
    env:
      - name: PHOENIX_HOST_ROOT_PATH
        value: "/phoenix"
  redis:
    enabled: true
    # Reference parity: alert-bridge uses JSON.SET for prompt bootstrap; load RedisJSON/Search/Bloom/TimeSeries modules.
    command: ["redis-server"]
    args:
      - "--loadmodule"
      - "/usr/local/lib/redis/modules/rejson.so"
      - "--loadmodule"
      - "/usr/local/lib/redis/modules/redisearch.so"
      - "--loadmodule"
      - "/usr/local/lib/redis/modules/redisbloom.so"
      - "--loadmodule"
      - "/usr/local/lib/redis/modules/redistimeseries.so"
      - "/config/redis.conf"
  sdrc:
    enabled: true
    configFilePath: configs/sdrc/config-verification.yml
    config:
      configMapName: sdrc-config
      key: config.yml
      mountPath: /config.yml
  elasticsearch:
    enabled: true
    persistence:
      data:
        size: 10Gi
      logs:
        size: 5Gi
      storageClass: ''
    init:
      enabled: true
      env:
        ELASTICSEARCH_ILM_MIN_AGE: 4h
        ELASTICSEARCH_RTVI_CV_EMBEDDINGS_DIM: '1536'
        ELASTICSEARCH_VISION_LLM_EMBEDDINGS_DIM: '768'
        BP_PROFILE: bp_developer_alerts
  kibana:
    enabled: true
    init:
      enabled: true
      objectsBundle: alerts
  kafka:
    enabled: true
    topicJob:
      enabled: true
    heapOpts: -Xmx6G -Xms6G
    persistence:
      size: 10Gi
      storageClass: ''
    resources:
      requests:
        memory: 6Gi
        cpu: '1'
      limits:
        memory: 8Gi
        cpu: '2'
    topics:
      - name: mdx-raw
      - name: mdx-bev
      - name: mdx-space-utilization
      - name: mdx-alerts
      - name: mdx-behavior
        retention_ms: '14400000'
        segment_ms: '3600000'
        replication_factor: '1'
      - name: mdx-behavior-plus
      - name: mdx-frames
      - name: mdx-mtmc
      - name: mdx-rtls
      - name: mdx-rtls-region-1
      - name: mdx-amr
      - name: mdx-vlm-alerts
      - name: mdx-notification
        partitions: '1'
      - name: mdx-events
      - name: mdx-incidents
      - name: mdx-vlm-incidents
      - name: mdx-vlm
      - name: mdx-embed
      - name: mdx-embed-filtered
      - name: vision-llm-messages
      - name: vision-llm-events-incidents
      - name: vision-llm-errors
  logstash:
    enabled: true
  vss-broker-health-check:
    enabled: true
    kafkaHost: ""
    kafkaPort: "9092"
    redisHost: ""
    redisPort: "6379"

# VIOS umbrella (../../services/vios). Required: vios.enabled — parent Chart.yaml condition: vios.enabled. If missing/false, no VIOS workloads are installed.
vios:
  enabled: true
  vstStorage:
    createSharedPvcs: true
    accessMode: ReadWriteOnce
    vstData:
      size: 10Gi
      storageClass: ""
    vstVideo:
      size: 20Gi
      storageClass: ""
    streamerVideos:
      size: 20Gi
      storageClass: ""
  vss-vios-postgres:
    enabled: true

  vss-vios-envoy-proxy:
    enabled: false

  vss-vios-sdr:
    enabled: false

  vss-vios-sensor:
    enabled: true
    streamProcessorService: sdrc
    persistence:
      vstData: { enabled: true, create: false, existingClaim: "" }
      vstVideo: { enabled: true, create: false, existingClaim: "" }

  vss-vios-streamprocessing:
    enabled: true
    useSdrEnvoyStyleHeadless: false
    headlessServiceName: ""
    persistence:
      vstData: { enabled: true, create: false, existingClaim: "" }
      vstVideo: { enabled: true, create: false, existingClaim: "" }
      streamerVideos: { enabled: true, create: false, existingClaim: "" }

  vss-vios-ingress:
    enabled: true
    externallyAccessibleIp: ""

  vss-vios-nvstreamer:
    enabled: true

agent:
  enabled: true
  vss-agent:
    enabled: true
    # Same shape as met-blueprints helm/developer-profiles/dev-profile-alerts (umbrella values).
    profile: alerts
    # Mode matrix: verification → rtviVlmEnabled false (RTVI_VLM_BASE_URL = VLM NIM URL, same as working legacy). Real-time → rtviVlmEnabled true + rtviVlmServiceName → vss-rtvi-vlm. cosmosEmbedEnabled false for both (no vss-rtvi-embed in alerts).
    rtviVlmEnabled: false
    cosmosEmbedEnabled: false
    # Set true only when `configs/vss-agent/incident_report_template.md` is packaged (see templates/vss-agent-configmap.yaml).
    reportTemplates:
      enabled: false
    # Shared chart defaults mountEvalOutput: true; alerts must not mount eval emptyDir.
    mountEvalOutput: false
    evalLlmJudgeName: ""
    evalLlmJudgeBaseUrl: ""
    reportsBaseUrl: ""
    vstExternalUrl: ""
    externalIp: ""
    # vss-agent: full explicit container env for Alerts (Option B).
    env:
      - name: VSS_AGENT_CONFIG_FILE
        value: '{{ .Values.configFilePath | default "/etc/vss-agent/config.yml" }}'
      - name: VSS_AGENT_HOST
        value: '0.0.0.0'
      - name: VSS_AGENT_PORT
        value: '8000'
      # Nemotron Nano Omni: set to "true" with Omni model + HF_TOKEN.
      - name: ENABLE_AUDIO
        value: '{{ .Values.enableAudio | default "false" }}'
      - name: LLM_MODE
        value: '{{- $g := .Values.global | default dict }}{{- $llm := (default "" (coalesce .Values.llmBaseUrl (index $g "llmBaseUrl"))) | toString | trim }}{{- if $llm }}remote{{- else }}local{{- end }}'
      - name: VLM_MODE
        value: '{{- $g := .Values.global | default dict }}{{- $vlm := (default "" (coalesce .Values.vlmBaseUrl (index $g "vlmBaseUrl"))) | toString | trim }}{{- if $vlm }}remote{{- else }}local{{- end }}'
      - name: LLM_MODEL_TYPE
        value: nim
      - name: VLM_MODEL_TYPE
        value: nim
      - name: VSS_AGENT_OBJECT_STORE_TYPE
        value: local_object_store
      - name: VSS_AGENT_TEMPLATE_PATH
        value: '{{- $rt := .Values.reportTemplates | default dict }}{{- if ($rt.enabled | default false) }}/etc/vss-agent/report-templates{{- end }}'
      - name: VSS_AGENT_TEMPLATE_NAME
        value: '{{- $rt := .Values.reportTemplates | default dict }}{{- if ($rt.enabled | default false) }}{{ $rt.configMapKey | default "incident_report_template.md" }}{{- end }}'
      - name: EXTERNAL_IP
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{ coalesce .Values.externalIp $eh "127.0.0.1" }}'
      - name: INTERNAL_IP
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $viosIng := ternary (printf "%s-vss-vios-ingress:30888" .Release.Name) "vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstInternalIp $viosIng }}'
      - name: HOST_IP
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $viosIng := ternary (printf "%s-vss-vios-ingress:30888" .Release.Name) "vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstInternalIp $viosIng }}'
      - name: LVS_BACKEND_URL
        value: ''
      - name: RTVI_EMBED_PORT
        value: ''
      - name: RTVI_CV_PORT
        value: ''
      - name: VSS_ES_PORT
        value: '9200'
      - name: VST_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vstHttp := ternary (printf "http://%s-vss-vios-ingress:30888" .Release.Name) "http://vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstBaseUrl .Values.vstExternalUrl $globalBase $vstHttp }}'
      - name: VIDEO_ANALYSIS_MCP_URL
        value: '{{- if (trim (.Values.videoAnalysisMcpUrl | default "")) }}{{ trim .Values.videoAnalysisMcpUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $host := ternary (printf "%s-vss-va-mcp" .Release.Name) "vss-va-mcp" $pfx }}{{- printf "http://%s:9901" $host -}}{{- end }}'
      - name: RTVI_VLM_BASE_URL
        value: '{{- if (trim (.Values.rtviVlmBaseUrl | default "")) }}{{ trim .Values.rtviVlmBaseUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $svc := trim (.Values.rtviVlmServiceName | default "vss-rtvi-vlm") }}{{- printf "http://%s:8000" (ternary (printf "%s-%s" .Release.Name $svc) $svc $pfx) -}}{{- end }}'
      - name: ALERT_BRIDGE_URL
        value: '{{- if (trim (.Values.alertBridgeUrl | default "")) }}{{ trim .Values.alertBridgeUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $svc := trim (.Values.alertBridgeServiceName | default "vss-alert-bridge") }}{{- printf "http://%s:9080" (ternary (printf "%s-%s" .Release.Name $svc) $svc $pfx) -}}{{- end }}'
      - name: NVIDIA_API_KEY
        value: ''
      - name: OPENAI_API_KEY
        value: ''
      - name: COSMOS_EMBED_ENDPOINT
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $def := ternary (printf "http://%s-vss-rtvi-embed:8000" .Release.Name) "http://vss-rtvi-embed:8000" $pfx }}{{ coalesce .Values.cosmosEmbedEndpoint $def }}'
      - name: ELASTIC_SEARCH_ENDPOINT
        value: '{{- if (trim (.Values.elasticsearchUrl | default "")) }}{{ trim .Values.elasticsearchUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $h := ternary (printf "%s-elasticsearch" .Release.Name) "elasticsearch" $pfx }}{{- printf "http://%s:9200" $h -}}{{- end }}'
      - name: ELASTIC_SEARCH_INDEX
        value: '{{ .Values.elasticsearchIndex | default "" }}'
      - name: PHOENIX_ENDPOINT
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{ ternary (printf "http://%s-phoenix:6006" .Release.Name) "http://phoenix:6006" $pfx }}'
      - name: LLM_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $llm := (default "" (coalesce .Values.llmBaseUrl (index $g "llmBaseUrl"))) | toString | trim }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $def := ternary (printf "http://%s-nvidia-nemotron-nano-9b-v2:8000" .Release.Name) "http://nvidia-nemotron-nano-9b-v2:8000" $pfx }}{{- if $llm }}{{ $llm }}{{- else }}{{ $def }}{{- end }}'
      - name: VLM_BASE_URL
        value: '{{- if (trim (.Values.rtviVlmBaseUrl | default "")) }}{{ trim .Values.rtviVlmBaseUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $svc := trim (.Values.rtviVlmServiceName | default "vss-rtvi-vlm") }}{{- printf "http://%s:8000" (ternary (printf "%s-%s" .Release.Name $svc) $svc $pfx) -}}{{- end }}'
      - name: VST_EXTERNAL_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.vssAgentExternalUrl .Values.vstExternalUrl $globalBase $vssAgentHttp }}'
      - name: VST_INTERNAL_URL
        value: '{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vstHttp := ternary (printf "http://%s-vss-vios-ingress:30888" .Release.Name) "http://vss-vios-ingress:30888" $pfx }}{{ coalesce .Values.vstInternalUrl $vstHttp }}'
      - name: LLM_NAME
        value: '{{- $g := .Values.global | default dict }}{{ trim (coalesce .Values.llmName ((index $g "llmName") | default "") "nvidia/nvidia-nemotron-nano-9b-v2") }}'
      - name: VLM_NAME
        value: '{{- $g := .Values.global | default dict }}{{ trim (coalesce .Values.vlmName ((index $g "vlmName") | default "") "nvidia/cosmos-reason2-8b") }}'
      - name: EVAL_LLM_JUDGE_NAME
        value: '{{- $g := .Values.global | default dict }}{{- $ln := trim (coalesce .Values.llmName ((index $g "llmName") | default "") "nvidia/nvidia-nemotron-nano-9b-v2") }}{{ coalesce .Values.evalLlmJudgeName $ln }}'
      - name: EVAL_LLM_JUDGE_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $llm := (default "" (coalesce .Values.llmBaseUrl (index $g "llmBaseUrl"))) | toString | trim }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $def := ternary (printf "http://%s-nvidia-nemotron-nano-9b-v2:8000" .Release.Name) "http://nvidia-nemotron-nano-9b-v2:8000" $pfx }}{{ coalesce .Values.evalLlmJudgeBaseUrl $llm $def }}'
      - name: VSS_AGENT_REPORTS_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.reportsBaseUrl (ternary (printf "%s/static/" $globalBase) "" (ne $globalBase "")) (printf "%s/static/" $vssAgentHttp) }}'
      - name: VSS_AGENT_EXTERNAL_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.vssAgentExternalUrl .Values.vstExternalUrl $globalBase $vssAgentHttp }}'
      - name: AGENT_BASE_URL
        value: '{{- $g := .Values.global | default dict }}{{- $eh := index $g "externalHost" | default "" | trim }}{{- $es := index $g "externalScheme" | default "http" }}{{- $ep := index $g "externalPort" | default "" | trim }}{{- $globalBase := ternary (ternary (printf "%s://%s:%s" $es $eh $ep) (printf "%s://%s" $es $eh) (ne $ep "")) "" (ne $eh "") }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $vssAgentHttp := ternary (printf "http://%s-vss-agent:8000" .Release.Name) "http://vss-agent:8000" $pfx }}{{ coalesce .Values.vssAgentExternalUrl .Values.vstExternalUrl $globalBase $vssAgentHttp }}'
      - name: VSS_AGENT_VERSION
        value: '{{ .Values.vssAgentVersion | default "3.2.0-26.05.2-67b165b4bfbd" }}'
    waitForDependencies:
      enabled: true
  vss-va-mcp:
    enabled: true
    vstIngressUrl: ""
    elasticsearchUrl: ""

vss-agent-ui:
  enabled: true
  # Aligned with met-blueprints dev-profile-alerts: appSubtitle + minimal envOverrides; rest from deploy/helm/services/ui/values.yaml `env`.
  appSubtitle: "Vision (Alerts - CV)"
  enableDashboardTab: "false"
  fillAlertBridgeUrlFromGlobal: true
  agentApiUrlBase: ""
  vstApiUrl: ""
  chatCompletionUrl: ""
  websocketChatUrl: ""
  alertsApiUrl: ""
  envOverrides:
    - name: NEXT_PUBLIC_ENABLE_CHAT_TAB
      value: "false"
    - name: NEXT_PUBLIC_SIDEBAR_CHAT_WORKFLOW
      value: "VSS Agent"
    - name: NEXT_PUBLIC_SIDEBAR_CHAT_CHAT_API_CUSTOM_AGENT_PARAMS_JSON
      value: '{"params":[{"name":"llm_reasoning","label":"LLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""},{"name":"vlm_reasoning","label":"VLM Reasoning","type":"boolean","default-value":false,"changeable":true,"tooltip-info":""}]}'
    - name: NEXT_PUBLIC_ENABLE_CHAT_SIDEBAR
      value: "true"
    - name: NEXT_PUBLIC_ENABLE_ALERTS_TAB
      value: "true"
    - name: NEXT_PUBLIC_SIDEBAR_CHAT_CHAT_UPLOAD_FILE_ENABLE
      value: "false"
    - name: NEXT_PUBLIC_VIDEO_MANAGEMENT_VIDEO_UPLOAD_ENABLE
      value: "false"
    - name: NEXT_PUBLIC_VIDEO_MANAGEMENT_TAB_ADD_RTSP_ENABLE
      value: "true"
    - name: NEXT_PUBLIC_WEB_SOCKET_DEFAULT_ON
      value: "false"
    - name: NEXT_PUBLIC_ALERTS_TAB_VERIFIED_FLAG_DEFAULT
      value: "true"
vss-alert-bridge:
  enabled: true
  kafkaBootstrapServers: ""
  redisHost: ""
  redisPort: "6379"
  elasticHosts: ""
  vlmBaseUrl: '{{- if (trim (.Values.rtviVlmBaseUrl | default "")) }}{{ trim .Values.rtviVlmBaseUrl }}{{- else }}{{- $g := .Values.global | default dict }}{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix ((index $g "useReleaseNamePrefix") | default false)) }}{{- $svc := trim (.Values.rtviVlmServiceName | default "vss-rtvi-vlm") }}{{- printf "http://%s:8000" (ternary (printf "%s-%s" .Release.Name $svc) $svc $pfx) -}}{{- end }}'
  vlmName: "nim_nvidia_cosmos-reason2-8b_hf-1208"
  vstBaseUrl: ""
  alertReviewMediaBaseDir: ""
  configVariant: ""
  waitForDependencies:
    enabled: true

analytics:
  enabled: true
  vss-behavior-analytics:
    enabled: true
    command:
      - python3
      - apps/dev_example/main_dev_example_app.py
      - --config
      - /resources/vss-behavior-analytics-config.json
    config:
      kafkaConfigJson: |
        {
          "kafka": {
            "brokers": "kafka-kafka:9092",
            "topics": [
              {"name": "raw", "value": "mdx-raw"},
              {"name": "notification", "value": "mdx-notification"},
              {"name": "incidents", "value": "mdx-incidents"}
            ],
            "consumer": {
              "autoOffsetReset": "latest",
              "enableAutoCommit": false,
              "maxPollIntervalMs": 900000,
              "maxPartitionFetchBytes": 10485760,
              "fetchMaxBytes": 104857600,
              "maxPollRecords": 10000,
              "timeout": 0.01
            },
            "producer": {
              "lingerMs": 0
            },
