nims:
  enabled: true
  gpuType: H100
  global:
    # Must differ from chart root docker pull Secret name (`global.imagePullSecrets` → ngc-docker-reg-secret from templates/secrets.yaml).
    # Reusing ngc-docker-reg-secret here duplicates the same Secret in the nims subchart and breaks installs/upgrades (Helm SSA / original object errors).
    pullSecretName: ngc-nim-docker-reg-secret
    authSecretName: ngc-api
    storageClass: ""
  nemotron:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2
      tag: '1'
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      limits:
        nvidia.com/gpu: '1'
      requests:
        nvidia.com/gpu: '1'
    storage:
      pvc:
        storageClass: ''
        size: 50Gi
    service:
      type: ClusterIP
      port: 8000
    nodeSelector: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    env:
      CUDA_VISIBLE_DEVICES: '0'
  cosmos:
    enabled: true
    image:
      repository: nvcr.io/nim/nvidia/cosmos-reason2-8b
      tag: 1.6.0
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      limits:
        nvidia.com/gpu: '1'
      requests:
        nvidia.com/gpu: '1'
    storage:
      pvc:
        storageClass: ''
        size: 200Gi
    service:
      type: ClusterIP
      port: 8000
    nodeSelector: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    env:
      CUDA_VISIBLE_DEVICES: '1'
      NIM_KVCACHE_PERCENT: '0.75'
      NIM_MAX_MODEL_LEN: '16384'
      NIM_LOW_MEMORY_MODE: 'true'
