enabled: false
# alerts | search | standalone-2d | standalone-3d
profileMode: alerts

global: {}
imagePullSecrets:
  - name: ngc-docker-reg-secret
scripts:
  create: false
  existingConfigMap: ""
  data: {}

image:
  repository: nvcr.io/nvstaging/vss-core/vss-rt-cv
  tag: "3.2.0-26.05.1"
  pullPolicy: IfNotPresent

replicas: 1
statefulSetName: "vss-rtvi-cv"
workingDir: /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app
runtimeClassName: ""

service:
  port: 9010
  type: ClusterIP
httpPort: 9000

streamType: "kafka"
modelType: "cnn"
otelSdkDisabled: "true"
otelServiceName: "rtvi-cv"
deepstreamEnableSensorIdExtraction: "1"
gstEnableCustomParserModifications: "1"
hfHubOffline: "0"
transformersOffline: "0"

env:
  MODEL_NAME_2D: "GDINO"
  MODEL_TYPE: "cnn"
  NUM_SENSORS: "1"
  STREAM_TYPE: "kafka"

kafka:
  bootstrapServers: ""
kafkaBrokerConnStr: ""

# Rare: set true so PVC size comes only from values (may trigger resize). Default false = match existing claim when present.
forceModelsStorageFromValues: false

modelsVolume: {}
downloadModelsFromNgc: true
downloadModelsFromNgcWaitSeconds: 900
ngcApiKeySecretName: "ngc-api"
ngcApiKeySecretKey: "NGC_CLI_API_KEY"
ngcOrg: "nvidia"
ngcDownload:
  image:
    repository: docker.io/library/ubuntu
    tag: "22.04"
    pullPolicy: IfNotPresent
ngcModelsToDownload:
  []

# NGC *resource* bundle (videos + warehouse models) for profileMode standalone-2d / standalone-3d.
# Download Job unpacks the .tar.gz onto the shared -models PVC under vss-warehouse-app-data/.
downloadNgcAppData: false
ngcAppDataResourceVersion: "<vss-warehouse-app-data-resource>"
# Required with NGC_CLI_API_KEY: registry org for the resource (e.g. nvstaging for vss-warehouse).
ngcAppDataOrg: "nvstaging"
downloadNgcAppDataWaitSeconds: 3600

# Used when profileMode is standalone-2d or standalone-3d (metropolis warehouse ds-start.sh paths).
standaloneWarehouse:
  # No Kafka/Redis in standalone; ds-main uses FakeSink (sink0). Valid values depend on app; default avoids kafka client paths.
  streamType: "none"
  dsModeFlag2d: "1"
  dsModeFlag3d: "5"
  dsMessageRate: "1"
  dsTrackerReid: "false"
  dsShowSensorId: "false"
  sparse4dDebugTs: "1"
  networkWidth: "960"
  networkHeight: "540"
  hardwareProfile: ""
  # Sparse4D weights inside PVC (paths relative to PVC root; default matches NGC vss-warehouse-app-data layout).
  sparse4dOnnxFile: sparse4d_warehouse_v2.2.onnx
  sparse4dNpyFile: _ov_kmeans900_v2.2.npy
  pvcOnnxSubPath: vss-warehouse-app-data/models/sparse4d/ov/sparse4d_warehouse_v2.2.onnx
  pvcNpySubPath: vss-warehouse-app-data/models/sparse4d/ov/_ov_kmeans900_v2.2.npy

modelsPvc:
  create: false
  size: 50Gi
  storageClass: ""
# Per-model metadata (onnx filenames, infer dims, etc.) is profile-specific and
# should be defined in each profile values/template (e.g. dev-profile-search).

persistence:
  storageClass: ""
  models:
    size: 50Gi

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector: {}
tolerations: []
