enabled: false
global: {}

image:
  repository: nvcr.io/nvstaging/vss-core/vss-video-analytics-api
  tag: "3.2-26.05.23"
  pullPolicy: IfNotPresent
replicas: 1

kafkaBrokers: ""   # default: kafka-kafka:9092 (<release>-kafka-kafka:9092 if global.useReleaseNamePrefix)
elasticsearchNode: ""   # default: http://<release>-elasticsearch:9200

service:
  port: 8081
  type: ClusterIP

storage:
  size: 5Gi
  storageClass: ""

resources: {}
nodeSelector: {}
tolerations: []

# Wait until Kafka and Elasticsearch accept TCP before starting the Node app (same idea as vss-alert-bridge).
waitForDependencies:
  enabled: false
  image:
    repository: busybox
    tag: "1.37.0"
    pullPolicy: IfNotPresent
  kafkaHost: ""
  kafkaPort: "9092"
  elasticsearchHost: ""
  elasticsearchPort: "9200"
  maxRetries: "90"
  retryInterval: "2"
