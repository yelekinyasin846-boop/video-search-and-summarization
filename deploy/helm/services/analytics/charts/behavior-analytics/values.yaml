# Defaults keep `helm lint` on this chart passing; umbrella profiles set enabled,
# command, and config.kafkaConfigJson.
enabled: false

global: {}

replicas: 1

image:
  repository: nvcr.io/nvstaging/vss-core/vss-behavior-analytics
  tag: "3.2-26.05.17"
  pullPolicy: IfNotPresent

port: 8080

service:
  type: ClusterIP

# Container command (including app entrypoint and --config path).
command: []

# Full application JSON for vss-behavior-analytics-config.json (parent-owned).
config:
  kafkaConfigJson: ""

resourceFiles:
  calibration:
    enabled: false
    mountPath: /resources/calibration.json
  roadNetwork:
    enabled: false
    mountPath: /resources/road-network.json

downloadResourcesFromNgc: false
downloadResourcesFromNgcWaitSeconds: 300
ngcApiKeySecretName: "ngc-api"
ngcApiKeySecretKey: "NGC_CLI_API_KEY"
ngcOrg: "nvidia"
ngcDownload:
  image:
    repository: docker.io/library/ubuntu
    tag: "22.04"
    pullPolicy: IfNotPresent
ngcResourcesToDownload: []

forceResourcesStorageFromValues: false
resourcesPvc:
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

imagePullSecrets: []

resources: {}

nodeSelector: {}

tolerations: []
