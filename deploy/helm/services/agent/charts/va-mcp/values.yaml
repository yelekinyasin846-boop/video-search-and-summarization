enabled: false
global: {}

image:
  repository: nvcr.io/nvstaging/vss-core/vss-agent
  tag: "3.2.0-26.05.2-67b165b4bfbd"
  pullPolicy: IfNotPresent
# Image must have mcp[cli] (typer) installed for `mcp serve` (same as Docker Compose).
replicas: 1

# Parameterized for K8s (used in config template and/or env)
vstIngressUrl: ""   # default: http://<release>-vss-vios-ingress:30888
elasticsearchUrl: ""   # default: http://<release>-elasticsearch:9200
# Optional: HuggingFace token for authenticated downloads (compose: HF_TOKEN)
hfToken: ""
# VST MCP gateway URL (compose: VST_MCP_URL). Default uses release-based vst-ingress.
vstMcpUrl: ""
# Optional host IP (compose: HOST_IP). In K8s often left empty; set if app needs it.
hostIp: ""

service:
  port: 9901
  type: ClusterIP

resources: {}
nodeSelector: {}
tolerations: []
